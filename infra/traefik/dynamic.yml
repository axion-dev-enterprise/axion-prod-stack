http:
  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

    security-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        referrerPolicy: strict-origin-when-cross-origin
        customResponseHeaders:
          X-Robots-Tag: noindex,nofollow

    compression:
      compress: {}

    public-rate-limit:
      rateLimit:
        average: 100
        burst: 50

    ops-rate-limit:
      rateLimit:
        average: 30
        burst: 20

    chain-public:
      chain:
        middlewares:
          - security-headers
          - compression
          - public-rate-limit

    chain-ops:
      chain:
        middlewares:
          - security-headers
          - compression
          - ops-rate-limit

tls:
  certificates:
    - certFile: /etc/letsencrypt/live/flow-tenants.axionenterprise.cloud/fullchain.pem
      keyFile: /etc/letsencrypt/live/flow-tenants.axionenterprise.cloud/privkey.pem
