name: ${STACK_NAME}

networks:
  edge:
    name: axion_edge
    driver: bridge
  internal:
    name: axion_internal
    driver: bridge
    internal: true
  observability:
    name: axion_observability
    driver: bridge
  tenants:
    name: axion_tenants
    driver: bridge

services:
  traefik:
    image: traefik:v3.6.13
    restart: unless-stopped
    mem_limit: ${TRAEFIK_MEM_LIMIT:-128m}
    cpus: ${TRAEFIK_CPUS:-0.20}
    pids_limit: 200
    networks: [edge, internal, observability, tenants]
    ports:
      - "${TRAEFIK_HTTP_BIND:-127.0.0.1:8088}:8080"
      - "${TRAEFIK_HTTPS_BIND:-127.0.0.1:8443}:443"
    command:
      - --configFile=/etc/traefik/traefik.yml
    volumes:
      - ../infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${AXION_ROOT}/runtime/traefik:/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["edge"]
    mem_limit: ${CLOUDFLARED_MEM_LIMIT:-96m}
    cpus: ${CLOUDFLARED_CPUS:-0.10}
    depends_on: [traefik]
    networks: [edge]
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    mem_limit: ${VALKEY_MEM_LIMIT:-192m}
    cpus: ${VALKEY_CPUS:-0.20}
    pids_limit: 150
    networks: [internal]
    command:
      - sh
      - -lc
      - >-
        valkey-server
        --appendonly yes
        --appendfsync everysec
        --lazyfree-lazy-eviction yes
        --lazyfree-lazy-expire yes
        --maxmemory "$$VALKEY_MAXMEMORY"
        --maxmemory-policy allkeys-lru
        --tcp-keepalive 60
        --requirepass "$$VALKEY_PASSWORD"
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
      VALKEY_MAXMEMORY: ${VALKEY_MAXMEMORY:-128mb}
    volumes:
      - ${AXION_ROOT}/data/valkey:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$${VALKEY_PASSWORD}\" ping | grep -q PONG"]
      interval: 20s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.11-alpine
    restart: unless-stopped
    mem_limit: ${NATS_MEM_LIMIT:-192m}
    cpus: ${NATS_CPUS:-0.20}
    pids_limit: 150
    networks: [internal]
    command:
      - -js
      - -sd
      - /data
      - -m
      - "${NATS_MONITOR_PORT}"
    volumes:
      - ${AXION_ROOT}/data/nats:/data

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-768m}
    cpus: ${POSTGRES_CPUS:-0.60}
    pids_limit: 300
    networks: [internal]
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-1024MB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-8MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-128MB}
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-40}
      - -c
      - wal_compression=on
      - -c
      - random_page_cost=1.1
      - -c
      - shared_preload_libraries=vector
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${AXION_ROOT}/data/postgres:/var/lib/postgresql/data
      - ${AXION_ROOT}/data/postgres-dumps:/dumps
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 20s
      timeout: 5s
      retries: 5

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    profiles: ["status"]
    mem_limit: ${KUMA_MEM_LIMIT:-256m}
    cpus: ${KUMA_CPUS:-0.25}
    networks: [edge, internal, observability]
    ports:
      - "${KUMA_LOCAL_PORT}:3001"
    volumes:
      - ${AXION_ROOT}/data/kuma:/app/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=axion_edge
      - traefik.http.routers.kuma.rule=Host(`status.${BASE_DOMAIN}`)
      - traefik.http.routers.kuma.entrypoints=websecure
      - traefik.http.routers.kuma.tls=true
      - traefik.http.routers.kuma.middlewares=chain-ops@file
      - traefik.http.routers.kuma-public-root.rule=Host(`status.${BASE_DOMAIN}`) && Path(`/`)
      - traefik.http.routers.kuma-public-root.entrypoints=websecure
      - traefik.http.routers.kuma-public-root.tls=true
      - traefik.http.routers.kuma-public-root.priority=100
      - traefik.http.routers.kuma-public-root.middlewares=kuma-status-root-redirect@docker
      - traefik.http.routers.kuma-public-root.service=kuma
      - traefik.http.middlewares.kuma-status-root-redirect.redirectregex.regex=^https://status\\.${BASE_DOMAIN}/$$
      - traefik.http.middlewares.kuma-status-root-redirect.redirectregex.replacement=https://status.${BASE_DOMAIN}/status/public
      - traefik.http.middlewares.kuma-status-root-redirect.redirectregex.permanent=true
      - traefik.http.services.kuma.loadbalancer.server.port=3001

  loki:
    image: grafana/loki:3.7.0
    restart: unless-stopped
    profiles: ["observability"]
    user: "0"
    mem_limit: ${LOKI_MEM_LIMIT:-384m}
    cpus: ${LOKI_CPUS:-0.30}
    networks: [observability, internal]
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ${AXION_ROOT}/data/loki:/loki

  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    profiles: ["observability"]
    mem_limit: ${ALLOY_MEM_LIMIT:-192m}
    cpus: ${ALLOY_CPUS:-0.20}
    depends_on: [loki]
    networks: [observability, internal]
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ../infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${AXION_ROOT}/data/alloy:/var/lib/alloy/data

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    profiles: ["observability"]
    user: "0"
    mem_limit: ${GRAFANA_MEM_LIMIT:-320m}
    cpus: ${GRAFANA_CPUS:-0.35}
    depends_on: [loki]
    networks: [edge, internal, observability]
    ports:
      - "${GRAFANA_LOCAL_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.${BASE_DOMAIN}
    volumes:
      - ${AXION_ROOT}/data/grafana:/var/lib/grafana
      - ../infra/grafana/provisioning:/etc/grafana/provisioning:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=axion_edge
      - traefik.http.routers.grafana.rule=Host(`grafana.${BASE_DOMAIN}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.middlewares=chain-ops@file
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  qr-scanner:
    build:
      context: ../infra/scanner
    restart: unless-stopped
    mem_limit: ${QR_SCANNER_MEM_LIMIT:-128m}
    cpus: ${QR_SCANNER_CPUS:-0.15}
    networks: [edge, internal, observability]
    environment:
      QR_SCANNER_CONTAINER_PREFIX: ${QR_SCANNER_CONTAINER_PREFIX:-picoclaw-}
      QR_SCANNER_SITE_TITLE: ${QR_SCANNER_SITE_TITLE:-AXION QR Dashboard}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8000/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=axion_edge
      - traefik.http.routers.qr-scanner.rule=Host(`scan.${BASE_DOMAIN}`)
      - traefik.http.routers.qr-scanner.entrypoints=websecure
      - traefik.http.routers.qr-scanner.tls=true
      - traefik.http.routers.qr-scanner.middlewares=chain-ops@file
      - traefik.http.services.qr-scanner.loadbalancer.server.port=8000

  tenant-chat:
    build:
      context: ../infra/tenant-chat
    restart: unless-stopped
    mem_limit: ${TENANT_CHAT_MEM_LIMIT:-160m}
    cpus: ${TENANT_CHAT_CPUS:-0.20}
    networks: [edge, tenants]
    environment:
      TENANT_CHAT_SITE_TITLE: ${TENANT_CHAT_SITE_TITLE:-AXION Tenant Chat}
      TENANT_CHAT_PICO_TOKEN: ${TENANT_CHAT_PICO_TOKEN:-${TENANT_ADMIN_TOKEN}}
      TENANT_CHAT_PICO_PORT: ${PICOCLAW_GATEWAY_PORT:-18790}
      TENANT_CHAT_TENANT_SUFFIX: .flow.${BASE_DOMAIN}
      TENANT_CHAT_CONTAINER_PREFIX: ${QR_SCANNER_CONTAINER_PREFIX:-picoclaw-}
      TENANT_CHAT_SCAN_HOST: https://scan.${BASE_DOMAIN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8010/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=axion_edge
      - traefik.http.routers.tenant-chat.rule=Host(`scan.${BASE_DOMAIN}`) && PathPrefix(`/chat`)
      - traefik.http.routers.tenant-chat.entrypoints=websecure
      - traefik.http.routers.tenant-chat.tls=true
      - traefik.http.routers.tenant-chat.priority=110
      - traefik.http.routers.tenant-chat.middlewares=chain-ops@file
      - traefik.http.services.tenant-chat.loadbalancer.server.port=8010

  picoclaw-official:
    build:
      context: ../infra/picoclaw-custom
      args:
        PICOCLAW_GIT_REF: ${PICOCLAW_GIT_REF:-e556a816e4db4c158ab3a455693018f452f63eba}
    container_name: picoclaw-axion-official
    restart: unless-stopped
    mem_limit: ${PICOCLAW_OFFICIAL_MEM_LIMIT:-768m}
    cpus: ${PICOCLAW_OFFICIAL_CPUS:-0.70}
    pids_limit: 200
    networks: [tenants, internal]
    environment:
      PICOCLAW_GATEWAY_HOST: 0.0.0.0
    command: ["gateway"]
    volumes:
      - ${AXION_ROOT}/tenants/axion-official/data:/root/.picoclaw
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:18790/health | grep -q '\"status\":\"ok\"'"]
      interval: 20s
      timeout: 5s
      retries: 5
