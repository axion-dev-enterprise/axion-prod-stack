name: ${STACK_NAME}

networks:
  edge:
    name: axion_edge
    driver: bridge
  internal:
    name: axion_internal
    driver: bridge
    internal: true
  observability:
    name: axion_observability
    driver: bridge
  tenants:
    name: axion_tenants
    driver: bridge

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    mem_limit: ${SOCKET_PROXY_MEM_LIMIT:-64m}
    cpus: ${SOCKET_PROXY_CPUS:-0.10}
    pids_limit: 100
    networks: [internal]
    environment:
      CONTAINERS: 1
      EVENTS: 1
      INFO: 1
      NETWORKS: 1
      PING: 1
      SERVICES: 1
      TASKS: 1
      VERSION: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run

  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    mem_limit: ${TRAEFIK_MEM_LIMIT:-128m}
    cpus: ${TRAEFIK_CPUS:-0.20}
    pids_limit: 200
    depends_on: [socket-proxy]
    networks: [edge, internal, observability, tenants]
    ports:
      - "${TRAEFIK_LOCAL_PORT}:8080"
    command:
      - --configFile=/etc/traefik/traefik.yml
    volumes:
      - ../infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ${AXION_ROOT}/runtime/traefik:/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["edge"]
    mem_limit: ${CLOUDFLARED_MEM_LIMIT:-96m}
    cpus: ${CLOUDFLARED_CPUS:-0.10}
    depends_on: [traefik]
    networks: [edge]
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    mem_limit: ${VALKEY_MEM_LIMIT:-192m}
    cpus: ${VALKEY_CPUS:-0.20}
    pids_limit: 150
    networks: [internal]
    command:
      - sh
      - -lc
      - >-
        valkey-server
        --appendonly yes
        --appendfsync everysec
        --lazyfree-lazy-eviction yes
        --lazyfree-lazy-expire yes
        --maxmemory "$$VALKEY_MAXMEMORY"
        --maxmemory-policy allkeys-lru
        --tcp-keepalive 60
        --requirepass "$$VALKEY_PASSWORD"
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
      VALKEY_MAXMEMORY: ${VALKEY_MAXMEMORY:-128mb}
    volumes:
      - ${AXION_ROOT}/data/valkey:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$${VALKEY_PASSWORD}\" ping | grep -q PONG"]
      interval: 20s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.11-alpine
    restart: unless-stopped
    mem_limit: ${NATS_MEM_LIMIT:-192m}
    cpus: ${NATS_CPUS:-0.20}
    pids_limit: 150
    networks: [internal]
    command:
      - -js
      - -sd
      - /data
      - -m
      - "${NATS_MONITOR_PORT}"
    volumes:
      - ${AXION_ROOT}/data/nats:/data

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-768m}
    cpus: ${POSTGRES_CPUS:-0.60}
    pids_limit: 300
    networks: [internal]
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-1024MB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-8MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-128MB}
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-40}
      - -c
      - wal_compression=on
      - -c
      - random_page_cost=1.1
      - -c
      - shared_preload_libraries=vector
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${AXION_ROOT}/data/postgres:/var/lib/postgresql/data
      - ${AXION_ROOT}/data/postgres-dumps:/dumps
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 20s
      timeout: 5s
      retries: 5

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    profiles: ["status"]
    mem_limit: ${KUMA_MEM_LIMIT:-256m}
    cpus: ${KUMA_CPUS:-0.25}
    networks: [edge, internal, observability]
    ports:
      - "${KUMA_LOCAL_PORT}:3001"
    volumes:
      - ${AXION_ROOT}/data/kuma:/app/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=axion_edge
      - traefik.http.routers.kuma.rule=Host(`status.${BASE_DOMAIN}`)
      - traefik.http.routers.kuma.entrypoints=web
      - traefik.http.routers.kuma.middlewares=chain-ops@file
      - traefik.http.services.kuma.loadbalancer.server.port=3001

  loki:
    image: grafana/loki:3.7.0
    restart: unless-stopped
    profiles: ["observability"]
    mem_limit: ${LOKI_MEM_LIMIT:-384m}
    cpus: ${LOKI_CPUS:-0.30}
    networks: [observability, internal]
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ${AXION_ROOT}/data/loki:/loki

  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    profiles: ["observability"]
    mem_limit: ${ALLOY_MEM_LIMIT:-192m}
    cpus: ${ALLOY_CPUS:-0.20}
    depends_on: [loki]
    networks: [observability, internal]
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ../infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${AXION_ROOT}/data/alloy:/var/lib/alloy/data

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    profiles: ["observability"]
    mem_limit: ${GRAFANA_MEM_LIMIT:-320m}
    cpus: ${GRAFANA_CPUS:-0.35}
    depends_on: [loki]
    networks: [edge, internal, observability]
    ports:
      - "${GRAFANA_LOCAL_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.${BASE_DOMAIN}
    volumes:
      - ${AXION_ROOT}/data/grafana:/var/lib/grafana
      - ../infra/grafana/provisioning:/etc/grafana/provisioning:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=axion_edge
      - traefik.http.routers.grafana.rule=Host(`grafana.${BASE_DOMAIN}`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.routers.grafana.middlewares=chain-ops@file
      - traefik.http.services.grafana.loadbalancer.server.port=3000
