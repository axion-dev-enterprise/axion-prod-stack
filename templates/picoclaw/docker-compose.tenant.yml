services:
  picoclaw:
    image: ${PICOCLAW_IMAGE}
    container_name: picoclaw-${TENANT_SLUG}
    restart: unless-stopped
    mem_limit: ${PICOCLAW_TENANT_MEM_LIMIT:-768m}
    cpus: ${PICOCLAW_TENANT_CPUS:-0.70}
    pids_limit: 200
    environment:
      PICOCLAW_GATEWAY_HOST: 0.0.0.0
    volumes:
      - ./data:/root/.picoclaw
    networks:
      - axion_tenants
      - axion_internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=axion_tenants
      - traefik.http.routers.picoclaw-${TENANT_SLUG}.rule=Host(`${TENANT_HOST}`)
      - traefik.http.routers.picoclaw-${TENANT_SLUG}.entrypoints=websecure
      - traefik.http.routers.picoclaw-${TENANT_SLUG}.tls=true
      - traefik.http.routers.picoclaw-${TENANT_SLUG}.middlewares=chain-public@file
      - traefik.http.services.picoclaw-${TENANT_SLUG}.loadbalancer.server.port=${PICOCLAW_GATEWAY_PORT}

networks:
  axion_tenants:
    external: true
  axion_internal:
    external: true
